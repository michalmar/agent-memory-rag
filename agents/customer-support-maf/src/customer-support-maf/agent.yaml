# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: customer-support-maf-hosted
description: Customer support agent implemented with Microsoft Agent Framework.
protocols:
  - protocol: responses
    version: 2.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: IQ_CONNECTION_ID
    value: ${IQ_CONNECTION_ID}
  - name: IQ_MCP_ENDPOINT
    value: ${IQ_MCP_ENDPOINT}
  - name: APP_TOOL_GATEWAY_URL
    value: ${APP_TOOL_GATEWAY_URL}
  - name: APP_TOOL_GATEWAY_SCOPE
    value: ${APP_TOOL_GATEWAY_SCOPE}
  - name: APP_TOOLS_CONNECTION_ID
    value: ${APP_TOOLS_CONNECTION_ID}
  - name: ENTRA_TENANT_ID
    value: ${ENTRA_TENANT_ID}
